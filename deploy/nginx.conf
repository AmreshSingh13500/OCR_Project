# [MODULE]   deploy/nginx.conf
# [TASK]     T6.2 — Process & proxy configuration (Phase 6)
# [SUBTASKS] T6.2.2 nginx: 443 SSL, proxy_pass to gunicorn, 1 MB body cap,
#                    300 s read timeout, security headers
# [SUMMARY]  nginx reverse-proxy server block — the single public entry point for the
#            OCR microservice. Terminates TLS on 443 (Let's Encrypt cert from certbot,
#            T6.1.2) and proxies to the gunicorn service on 127.0.0.1:8000 (T6.2.1).
#            Enforces the 1 MB request-body cap (the nginx half of T5.2.3's "Nginx 1 MB
#            + FastAPI level" pair) and a 300 s read timeout matching gunicorn's
#            --timeout 300 so long OCR/vision requests aren't cut off. Sets baseline
#            security response headers. Deploy by placing/including in nginx's http{}
#            context, e.g. copy to /etc/nginx/conf.d/ocr-service.conf.
#            DEPLOY: replace every `example.com` below with the real FQDN before reload.
# [PLAN]     IMPLEMENTATION_PLAN.md §4 → T6.2.2
# [HISTORY]  2026-07-18  T6.2.2  initial 443-only reverse-proxy block: TLS, proxy_pass
#                                 127.0.0.1:8000, client_max_body_size 1m,
#                                 proxy_read_timeout 300s, security headers

# [T6.2.2] HTTPS reverse proxy for the OCR microservice.
#
# Port 80 is intentionally absent. firewalld keeps 80 closed except during certbot
# --standalone HTTP-01 renewal (T6.1.2), and certbot binds 80 itself in that window — an
# nginx :80 listener would conflict with --standalone. So nginx serves 443 only; there is
# deliberately no http->https redirect block (it would be unreachable behind the firewall).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name example.com;   # DEPLOY: real FQDN

    # Let's Encrypt certificate, issued + auto-renewed by certbot (T6.1.2). These are the
    # standard /etc/letsencrypt live symlinks — certbot creates them under the real domain.
    # DEPLOY: replace example.com in both paths.
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # TLS baseline (Mozilla "intermediate" posture): TLS 1.2/1.3 only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Request-body cap — nginx half of the T5.2.3 pair (FastAPI enforces the same 1 MB via
    # enforce_body_size_limit). Rejects oversized uploads at the edge before they reach the app.
    client_max_body_size 1m;

    # Security response headers. `always` so they're sent on error responses too.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://127.0.0.1:8000;   # gunicorn loopback bind (T6.2.1)
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running OCR / vision requests: match gunicorn's --timeout 300 (T6.2.1) so the
        # proxy doesn't 504 a request the worker is still legitimately processing.
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
